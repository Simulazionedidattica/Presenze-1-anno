<!doctype html>
<html lang="it">
<head>
<base target="_top">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#eaf7fb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">
<title>Presenze QR · App stabile</title>
<style>
:root{
 --navy:#174b7c;--blue:#4b9bd3;--teal:#25aaa5;--teal2:#dff6f3;
 --pink:#e97598;--pink2:#fdebf1;--cream:#fffdf8;--bg:#edf7fa;
 --ink:#183c64;--muted:#71849a;--line:#d7e7ee;--white:#fff;
 --ok:#178a70;--warn:#bd7b19;--danger:#bc4c61;
 --shadow:0 12px 32px rgba(35,77,108,.12)
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg)}
body{font-family:Inter,ui-rounded,"SF Pro Rounded","Segoe UI",Roboto,Arial,sans-serif;color:var(--ink)}
button,input{font:inherit}
button{-webkit-tap-highlight-color:transparent}
.app{
 height:var(--app-height,100dvh);max-width:760px;margin:auto;padding:calc(8px + env(safe-area-inset-top)) 10px calc(8px + env(safe-area-inset-bottom));
 display:grid;grid-template-rows:auto auto minmax(0,1fr) auto auto;gap:8px;
 background:linear-gradient(180deg,#eefafa 0,#f9fcfd 46%,#f4f8fb 100%)
}
.header{
 display:grid;grid-template-columns:58px 1fr auto;align-items:center;gap:10px;
 background:rgba(255,255,255,.82);border:1px solid var(--line);border-radius:19px;
 padding:8px 10px;box-shadow:0 7px 20px rgba(32,76,110,.08)
}
.logo{width:54px;height:54px;object-fit:contain;border-radius:13px;background:white}
.title h1{margin:0;font-size:clamp(22px,6vw,30px);line-height:1;color:var(--navy);letter-spacing:-.03em}
.title p{margin:5px 0 0;font-size:11px;font-weight:850;color:var(--teal)}
.cloud{width:44px;height:44px;border-radius:14px;background:linear-gradient(145deg,#e5f6fb,#f9fbff);display:grid;place-items:center;font-size:22px;color:var(--blue)}

.turns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.turn{
 border:1px solid #cbdfe9;background:white;color:var(--navy);border-radius:16px;padding:9px 8px;
 font-weight:950;box-shadow:0 5px 14px rgba(31,76,108,.06)
}
.turn span{display:block;font-size:10px;color:var(--muted);margin-top:1px}
.turn.active{background:linear-gradient(135deg,#2bb9b2,#219e9b);color:white;border-color:transparent}
.turn.active span{color:#eaffff}

.scannerCard{
 min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr) auto auto;
 background:white;border:1px solid var(--line);border-radius:21px;padding:9px;
 box-shadow:var(--shadow);overflow:hidden
}
.scannerHead{display:flex;align-items:center;justify-content:space-between;padding:0 2px 7px}
.scannerHead strong{font-size:15px;color:var(--navy)}
.statusDot{font-size:10px;font-weight:900;padding:5px 8px;border-radius:999px;background:#eef4f7;color:var(--muted)}
.statusDot.ok{background:#eaf8f3;color:var(--ok)}
.statusDot.warn{background:#fff5e4;color:var(--warn)}
.camera{position:relative;min-height:0;overflow:hidden;border-radius:17px;background:linear-gradient(145deg,#cde8e9,#a8d0d7)}
.camera video{width:100%;height:100%;object-fit:cover;display:block}
.camera::before{
 content:"";position:absolute;inset:13% 18%;border:3px solid #44c7c1;border-radius:20px;
 box-shadow:0 0 0 999px rgba(18,57,69,.18),0 0 16px rgba(82,229,220,.7);z-index:2
}
.scanLine{position:absolute;z-index:3;left:21%;right:21%;top:28%;height:3px;border-radius:4px;background:#c8fffa;box-shadow:0 0 14px #8af5ec;animation:scan 2.1s ease-in-out infinite}
@keyframes scan{50%{top:69%}}
.camText{position:absolute;z-index:4;left:9px;right:9px;bottom:8px;background:rgba(255,255,255,.9);backdrop-filter:blur(7px);border-radius:11px;padding:7px 8px;text-align:center;font-size:10px;font-weight:900;color:var(--navy)}
.scanActions{display:grid;grid-template-columns:1.25fr 1fr;gap:7px;margin-top:7px}
.btn{border:0;border-radius:13px;padding:9px 8px;min-height:42px;font-weight:950;cursor:pointer}
.btn.primary{background:linear-gradient(135deg,#2bb8b1,#1e9f9b);color:white}
.btn.secondary{background:#edf6fa;color:#246593;border:1px solid #d2e4ec}
.btn.blue{background:linear-gradient(135deg,#66b5e8,#4b97cf);color:white}
.btn.pink{background:#fff0f4;color:var(--danger);border:1px solid #f0cad4}
.btn:disabled{opacity:.65}
.feedback{display:none;margin-top:7px;border-radius:12px;padding:8px 10px;font-size:11px;font-weight:800}
.feedback.show{display:block}
.feedback.ok{background:#eaf9f3;color:var(--ok);border:1px solid #bfe4d7}
.feedback.err{background:#fff0f3;color:var(--danger);border:1px solid #edc7d0}
.feedback.dup{background:#fff7e8;color:var(--warn);border:1px solid #efd7aa}
.feedback strong{display:block;font-size:13px;margin-bottom:2px}

.summaryGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.summary{
 border-radius:17px;padding:9px 10px;border:1px solid var(--line);display:grid;
 grid-template-columns:1fr auto;align-items:center;min-height:62px;cursor:pointer
}
.summary.morning{background:linear-gradient(145deg,#edfbfa,#e4f5f7);border-color:#bfe7e5}
.summary.afternoon{background:linear-gradient(145deg,#fff7fa,#fdeaf0);border-color:#f0cad5}
.summary small{display:block;color:var(--muted);font-weight:850;font-size:9px}
.summary strong{font-size:14px;color:var(--navy)}
.summary .count{font-size:26px;font-weight:1000}
.summary.morning .count{color:var(--teal)}
.summary.afternoon .count{color:var(--pink)}

.bottom{display:grid;grid-template-columns:1fr 1fr 1.15fr;gap:7px}
.bottom .btn{font-size:11px;min-height:44px}
.sendWrap{position:relative}
.pending{position:absolute;top:-6px;right:-5px;min-width:20px;height:20px;padding:0 5px;border-radius:999px;background:#f09b35;color:white;display:grid;place-items:center;font-size:10px;font-weight:1000;border:2px solid white}

.modal{position:fixed;inset:0;background:rgba(12,42,66,.55);display:none;z-index:50;align-items:flex-end}
.modal.show{display:flex}
.sheet{width:100%;max-width:760px;margin:auto;background:white;border-radius:24px 24px 0 0;padding:14px 12px calc(16px + env(safe-area-inset-bottom));max-height:88dvh;overflow:auto}
.sheetHead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.sheetHead h2{margin:0;font-size:19px;color:var(--navy)}
.close{width:38px;height:38px;border:1px solid var(--line);border-radius:12px;background:white;color:var(--navy);font-weight:1000}
.tabs{display:flex;gap:6px;background:#edf4f7;padding:4px;border-radius:14px;margin-bottom:10px}
.tab{flex:1;border:0;border-radius:10px;background:transparent;padding:9px 5px;font-weight:900;color:var(--muted)}
.tab.active{background:white;color:var(--navy);box-shadow:0 3px 10px rgba(20,58,87,.08)}
.list{display:grid;gap:7px}
.row{display:grid;grid-template-columns:38px 1fr auto auto;gap:8px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:8px;background:#fcfeff}
.avatar{width:36px;height:36px;border-radius:12px;background:linear-gradient(145deg,#dcf4f1,#eaf6fb);display:grid;place-items:center;font-size:12px;font-weight:1000;color:var(--navy)}
.row strong{display:block;font-size:13px}
.row small{font-size:10px;color:var(--muted)}
.badge{font-size:9px;font-weight:950;padding:5px 7px;border-radius:999px}
.badge.yes{background:#e8f8f1;color:var(--ok)}
.badge.no{background:#fff4e3;color:var(--warn)}
.deleteRow{width:34px;height:34px;border:1px solid #efc7d0;border-radius:11px;background:#fff3f5;color:var(--danger)}
.form{display:grid;gap:9px}
label{display:block;font-size:11px;font-weight:900;color:var(--muted);margin-bottom:4px}
input{width:100%;border:1px solid var(--line);border-radius:13px;padding:11px 12px;color:var(--ink)}
.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.note{font-size:11px;color:var(--muted);line-height:1.45}
.empty{text-align:center;color:var(--muted);padding:25px 8px;font-size:12px}

#photoInput,#csvInput{display:none}
@media(max-height:700px){
 .app{gap:6px;padding-top:calc(5px + env(safe-area-inset-top));padding-bottom:calc(5px + env(safe-area-inset-bottom))}
 .header{padding:6px 8px}.logo{width:46px;height:46px}.cloud{width:38px;height:38px}
 .title h1{font-size:21px}.title p{font-size:10px}
 .turn{padding:7px}.scannerCard{padding:7px}.summary{min-height:54px;padding:7px 8px}
 .bottom .btn{min-height:40px;padding:7px 5px}
}
@media(min-width:650px){
 .app{padding-left:16px;padding-right:16px}
 .camera::before{inset:11% 24%}.scanLine{left:27%;right:27%}
}

/* Ottimizzazione esclusiva smartphone */
html{
  height:100%;
  height:-webkit-fill-available;
  overscroll-behavior:none;
}
body{
  min-height:100%;
  min-height:-webkit-fill-available;
  overscroll-behavior:none;
  touch-action:manipulation;
  -webkit-text-size-adjust:100%;
}
.app{
  width:100%;
  max-width:520px;
  min-height:var(--app-height,100dvh);
  height:var(--app-height,100dvh);
}
.btn,.turn,.summary,.close,.deleteRow{
  touch-action:manipulation;
}
@media (max-width:480px){
  .app{
    padding:
      calc(6px + env(safe-area-inset-top))
      7px
      calc(6px + env(safe-area-inset-bottom));
    gap:6px;
    grid-template-rows:auto auto minmax(0,1fr) auto auto;
  }
  .header{
    grid-template-columns:48px 1fr 36px;
    gap:8px;
    border-radius:16px;
    padding:6px 8px;
  }
  .logo{
    width:46px;
    height:46px;
    border-radius:11px;
  }
  .title h1{
    font-size:clamp(21px,7vw,27px);
  }
  .title p{
    margin-top:3px;
    font-size:10px;
    white-space:nowrap;
  }
  .cloud{
    width:34px;
    height:34px;
    border-radius:11px;
    font-size:18px;
  }
  .turns{gap:6px}
  .turn{
    min-height:46px;
    padding:7px 5px;
    border-radius:13px;
    font-size:13px;
  }
  .turn span{
    font-size:8.5px;
  }
  .scannerCard{
    border-radius:18px;
    padding:7px;
    grid-template-rows:auto minmax(0,1fr) auto auto;
  }
  .scannerHead{
    padding-bottom:5px;
  }
  .scannerHead strong{
    font-size:14px;
  }
  .statusDot{
    font-size:9px;
    padding:4px 7px;
  }
  .camera{
    border-radius:14px;
  }
  .camera::before{
    inset:12% 17%;
    border-radius:17px;
  }
  .camText{
    left:7px;
    right:7px;
    bottom:6px;
    padding:6px;
    font-size:9px;
  }
  .scanActions{
    margin-top:5px;
    gap:5px;
  }
  .scanActions .btn{
    min-height:38px;
    padding:7px 5px;
    border-radius:11px;
    font-size:11px;
  }
  .feedback{
    margin-top:5px;
    padding:6px 8px;
    font-size:10px;
    border-radius:10px;
  }
  .feedback strong{
    font-size:11px;
  }
  .summaryGrid{gap:6px}
  .summary{
    min-height:51px;
    padding:6px 8px;
    border-radius:14px;
  }
  .summary small{
    font-size:7.7px;
  }
  .summary strong{
    font-size:12px;
  }
  .summary .count{
    font-size:23px;
  }
  .bottom{gap:5px}
  .bottom .btn{
    min-height:40px;
    padding:6px 3px;
    border-radius:11px;
    font-size:10px;
  }
  .pending{
    top:-5px;
    right:-4px;
    min-width:18px;
    height:18px;
    font-size:9px;
  }
}
@media (max-height:720px) and (max-width:480px){
  .app{
    padding-top:calc(4px + env(safe-area-inset-top));
    padding-bottom:calc(4px + env(safe-area-inset-bottom));
    gap:4px;
  }
  .header{
    padding:4px 7px;
  }
  .logo{
    width:40px;
    height:40px;
  }
  .header{
    grid-template-columns:42px 1fr 32px;
  }
  .title h1{
    font-size:20px;
  }
  .title p{
    font-size:8.5px;
  }
  .cloud{
    width:30px;
    height:30px;
  }
  .turn{
    min-height:40px;
    padding:5px 4px;
  }
  .turn span{
    display:none;
  }
  .scannerCard{
    padding:5px;
  }
  .scannerHead{
    padding-bottom:3px;
  }
  .scannerHead strong{
    font-size:12px;
  }
  .statusDot{
    font-size:8px;
  }
  .scanActions{
    margin-top:4px;
  }
  .scanActions .btn{
    min-height:34px;
    font-size:10px;
    padding:5px 3px;
  }
  .summary{
    min-height:44px;
    padding:5px 7px;
  }
  .summary small{
    display:none;
  }
  .summary strong{
    font-size:11px;
  }
  .summary .count{
    font-size:21px;
  }
  .bottom .btn{
    min-height:36px;
    font-size:9px;
  }
}
@media (max-height:620px) and (max-width:480px){
  .title p,.cloud{
    display:none;
  }
  .header{
    grid-template-columns:36px 1fr;
  }
  .logo{
    width:34px;
    height:34px;
  }
  .title h1{
    font-size:18px;
  }
  .scannerHead .statusDot{
    max-width:125px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
}
@media (orientation:landscape) and (max-height:520px){
  body::before{
    content:"Ruota il telefono in verticale";
    position:fixed;
    inset:0;
    z-index:9999;
    display:grid;
    place-items:center;
    padding:24px;
    background:#edf7fa;
    color:#174b7c;
    font-size:20px;
    font-weight:900;
    text-align:center;
  }
}

</style>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>

function setMobileViewportHeight(){
  document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
}
setMobileViewportHeight();
window.addEventListener('resize',setMobileViewportHeight);
window.addEventListener('orientationchange',()=>setTimeout(setMobileViewportHeight,250));

const STORAGE='presenze_qr_apps_script_v1',ROSTER='presenze_roster_v1';
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
const video=$('#video'),canvas=$('#canvas'),ctx=canvas.getContext('2d',{willReadFrequently:true});
let selectedTurn='07:00',activeTab='all',stream=null,scanning=false,detector=null,lastValue='',lastTime=0;

function loadRecords(){try{return JSON.parse(localStorage.getItem(STORAGE)||'[]')}catch{return[]}}
function saveRecords(v){localStorage.setItem(STORAGE,JSON.stringify(v));render()}
function loadRoster(){try{return JSON.parse(localStorage.getItem(ROSTER)||'{}')}catch{return{}}}
function dateKey(d=new Date()){return new Intl.DateTimeFormat('sv-SE',{timeZone:'Europe/Rome'}).format(d)}
function localParts(d=new Date()){return{date:new Intl.DateTimeFormat('it-IT',{timeZone:'Europe/Rome'}).format(d),time:new Intl.DateTimeFormat('it-IT',{timeZone:'Europe/Rome',hour:'2-digit',minute:'2-digit',second:'2-digit'}).format(d)}}
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function uuid(){return crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random().toString(16).slice(2)}
function autoTurn(){const n=new Date(),mins=n.getHours()*60+n.getMinutes();return mins<11*60?'07:00':'13:45'}
function chooseTurn(t){selectedTurn=t;$$('.turn').forEach(b=>b.classList.toggle('active',b.dataset.turn===t));$('#camText').textContent=stream?`Inquadra il QR · turno ${t}`:'Premi “Apri fotocamera”'}
function feedback(type,title,detail){const el=$('#feedback');el.className='feedback show '+type;el.innerHTML=`<strong>${esc(title)}</strong>${esc(detail)}`;clearTimeout(feedback.t);feedback.t=setTimeout(()=>el.classList.remove('show'),4500)}
function beep(ok=true){try{const a=new(window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=ok?880:220;g.gain.value=.06;o.start();o.stop(a.currentTime+.12)}catch{}if(navigator.vibrate)navigator.vibrate(ok?[80]:[120,70,120])}
function parseQR(raw){
 let out={codice_qr:String(raw||'').trim(),nome:'',cognome:'',matricola:''};
 try{const o=JSON.parse(out.codice_qr);out.codice_qr=String(o.codice_qr||o.qr||o.code||o.matricola||raw).trim();out.nome=String(o.nome||o.name||'').trim();out.cognome=String(o.cognome||o.surname||'').trim();out.matricola=String(o.matricola||o.student_id||'').trim()}catch{
  const p=out.codice_qr.split(/[;|,]/).map(x=>x.trim());
  if(p.length>=3){if(/^\d{4,}$/.test(p[0])){out.matricola=p[0];out.nome=p[1]||'';out.cognome=p[2]||''}else{out.cognome=p[0]||'';out.nome=p[1]||'';out.matricola=p[2]||''}}
 }
 const roster=loadRoster(),r=roster[out.codice_qr]||roster[out.matricola];if(r)out={...out,...r,codice_qr:out.codice_qr};
 return out
}
function registerPresence(raw,manualName=''){
 const now=new Date(),day=dateKey(now),p=parseQR(raw);
 if(manualName&&!p.nome&&!p.cognome){const x=manualName.trim().split(/\s+/);p.cognome=x.shift()||'';p.nome=x.join(' ')}
 if(!p.codice_qr)return feedback('err','Codice mancante','Inserisci o scansiona un QR valido.');
 const rs=loadRecords(),dup=rs.find(r=>r.giorno===day&&r.turno===selectedTurn&&(r.codice_qr===p.codice_qr||(p.matricola&&r.matricola===p.matricola)));
 if(dup){beep(false);return feedback('dup','Presenza già registrata',`${dup.nome_completo||dup.codice_qr} · turno ${selectedTurn}`)}
 const pt=localParts(now),rec={
  id_registrazione:uuid(),timestamp_iso:now.toISOString(),giorno:day,data:pt.date,ora:pt.time,turno:selectedTurn,
  codice_qr:p.codice_qr,nome:p.nome||'',cognome:p.cognome||'',matricola:p.matricola||'',
  nome_completo:[p.cognome,p.nome].filter(Boolean).join(' ').toUpperCase(),synced:false
 };
 rs.unshift(rec);saveRecords(rs);beep(true);feedback('ok','Presenza registrata',`${rec.nome_completo||rec.matricola||rec.codice_qr} · ${selectedTurn}`)
}

function serverCall(functionName,payload){
 return new Promise((resolve,reject)=>{
  const runner=google.script.run
    .withSuccessHandler(result=>{
      if(result&&result.ok)resolve(result);
      else reject(new Error(result&&result.error?result.error:'Operazione non confermata'));
    })
    .withFailureHandler(error=>{
      reject(new Error(error&&error.message?error.message:String(error)));
    });

  if(functionName==='salvaPresenza')runner.salvaPresenza(payload);
  else if(functionName==='cancellaPresenza')runner.cancellaPresenza(payload);
  else reject(new Error('Funzione server non riconosciuta'));
 });
}

async function syncRecord(rec){
 const result=await serverCall('salvaPresenza',{
  id_registrazione:rec.id_registrazione,
  timestamp_iso:rec.timestamp_iso,
  data:rec.data,
  ora:rec.ora,
  turno:rec.turno,
  nome:rec.nome,
  cognome:rec.cognome,
  matricola:rec.matricola,
  codice_qr:rec.codice_qr,
  note:`Turno ${rec.turno}`
 });

 const rs=loadRecords();
 const i=rs.findIndex(x=>x.id_registrazione===rec.id_registrazione);
 if(i>=0){
  rs[i].synced=true;
  localStorage.setItem(STORAGE,JSON.stringify(rs));
  render();
 }
 return result;
}

async function sendAll(){
 const pending=loadRecords().filter(r=>!r.synced);
 if(!pending.length){
  feedback('ok','✓ Tutto inviato','Non ci sono nuove presenze da trasferire.');
  return;
 }

 const btn=$('#sendBtn');
 const old=btn.innerHTML;
 btn.disabled=true;
 btn.innerHTML='⏳ Invio…';

 let sent=0;
 try{
  for(const r of pending){
    await syncRecord(r);
    sent++;
  }
  feedback(
    'ok',
    '✓ Invio completato correttamente',
    `${sent} presenz${sent===1?'a inviata':'e inviate'} al foglio Google.`
  );
  beep(true);
 }catch(error){
  feedback(
    'err',
    'Invio al foglio non riuscito',
    `${sent} inviate su ${pending.length}. ${error.message}`
  );
 }finally{
  btn.disabled=false;
  btn.innerHTML=old;
  render();
 }
}

async function deleteRecord(id){
 const rs=loadRecords();
 const rec=rs.find(r=>r.id_registrazione===id);
 if(!rec)return;

 const label=rec.nome_completo||rec.matricola||rec.codice_qr;
 if(!confirm(`Cancellare la presenza di ${label}?`))return;

 try{
  if(rec.synced){
    await serverCall('cancellaPresenza',{
      id_registrazione:rec.id_registrazione
    });
  }

  saveRecords(rs.filter(r=>r.id_registrazione!==id));
  feedback(
    'ok',
    '✓ Presenza cancellata',
    rec.synced?'Eliminata anche dal foglio Google.':'Registrazione locale rimossa.'
  );
 }catch(error){
  feedback('err','Cancellazione non riuscita',error.message);
 }
}
async function startCamera(){
 try{if(stream)stopCamera();stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=stream;await video.play();scanning=true;$('#cameraStatus').textContent='Fotocamera attiva';$('#cameraStatus').className='statusDot ok';$('#camText').textContent=`Inquadra il QR · turno ${selectedTurn}`;$('#startBtn').textContent='⏹ Chiudi fotocamera';if('BarcodeDetector'in window)try{detector=new BarcodeDetector({formats:['qr_code']})}catch{}requestAnimationFrame(scanLoop)}
 catch{$('#cameraStatus').textContent='Fotocamera bloccata';$('#cameraStatus').className='statusDot warn';feedback('err','Fotocamera non disponibile','Apri il sito in Safari o Chrome e autorizza la fotocamera.')}
}
function stopCamera(){scanning=false;if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}video.srcObject=null;$('#cameraStatus').textContent='Fotocamera inattiva';$('#cameraStatus').className='statusDot';$('#camText').textContent='Premi “Apri fotocamera”';$('#startBtn').textContent='📷 Apri fotocamera'}
async function scanLoop(){if(!scanning)return;try{let value='';if(detector){const c=await detector.detect(video);if(c[0])value=c[0].rawValue}else if(video.readyState>=2){const w=video.videoWidth,h=video.videoHeight;canvas.width=w;canvas.height=h;ctx.drawImage(video,0,0,w,h);const im=ctx.getImageData(0,0,w,h),q=jsQR(im.data,w,h,{inversionAttempts:'dontInvert'});if(q)value=q.data}if(value&&(value!==lastValue||Date.now()-lastTime>3500)){lastValue=value;lastTime=Date.now();registerPresence(value)}}catch{}requestAnimationFrame(scanLoop)}
async function decodePhoto(file){try{const b=await createImageBitmap(file);canvas.width=b.width;canvas.height=b.height;ctx.drawImage(b,0,0);if('BarcodeDetector'in window)try{const d=new BarcodeDetector({formats:['qr_code']}),c=await d.detect(canvas);if(c[0])return registerPresence(c[0].rawValue)}catch{}const im=ctx.getImageData(0,0,canvas.width,canvas.height),q=jsQR(im.data,canvas.width,canvas.height);q?registerPresence(q.data):feedback('err','QR non trovato','Riprova con una foto più nitida.')}catch{feedback('err','Immagine non leggibile','Riprova con una fotografia più nitida.')}}
function parseCSV(text){const lines=text.replace(/^\uFEFF/,'').split(/\r?\n/).filter(x=>x.trim());if(!lines.length)return{};const sep=(lines[0].match(/;/g)||[]).length>(lines[0].match(/,/g)||[]).length?';':',';const head=lines.shift().split(sep).map(x=>x.trim().toLowerCase().replace(/\s+/g,'_'));const roster={};lines.forEach(line=>{const c=line.split(sep).map(x=>x.trim().replace(/^"|"$/g,'')),o={};head.forEach((h,i)=>o[h]=c[i]||'');const code=o.codice_qr||o.qr||o.codice||o.matricola;if(code)roster[code]={nome:o.nome||'',cognome:o.cognome||'',matricola:o.matricola||'',codice_qr:code}});return roster}
function exportCSV(){const rows=loadRecords();if(!rows.length)return feedback('err','Nessun dato','Non ci sono presenze da esportare.');const cols=['data','ora','turno','cognome','nome','matricola','codice_qr','synced'];const csv=[cols.join(';'),...rows.map(r=>cols.map(c=>`"${String(r[c]??'').replace(/"/g,'""')}"`).join(';'))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download=`presenze_${dateKey()}.csv`;a.click();URL.revokeObjectURL(a.href)}
function initials(r){const s=(r.nome_completo||r.matricola||'QR').trim().split(/\s+/);return((s[0]?.[0]||'Q')+(s[1]?.[0]||'R')).toUpperCase()}
function render(){
 const rs=loadRecords(),today=dateKey(),tod=rs.filter(r=>r.giorno===today),m=tod.filter(r=>r.turno==='07:00'),a=tod.filter(r=>r.turno==='13:45'),pending=rs.filter(r=>!r.synced);
 $('#countMorning').textContent=m.length;$('#countAfternoon').textContent=a.length;$('#pendingCount').hidden=!pending.length;$('#pendingCount').textContent=pending.length;
 const list=activeTab==='all'?tod:tod.filter(r=>r.turno===activeTab);
 $('#presenceList').innerHTML=list.length?list.map(r=>`<div class="row"><div class="avatar">${esc(initials(r))}</div><div><strong>${esc(r.nome_completo||r.matricola||r.codice_qr)}</strong><small>${esc(r.turno)} · ${esc(r.ora)}</small></div><span class="badge ${r.synced?'yes':'no'}">${r.synced?'Inviata':'Da inviare'}</span><button class="deleteRow" data-delete="${esc(r.id_registrazione)}">🗑</button></div>`).join(''):'<div class="empty">Nessuna presenza.</div>';
 const n=Object.keys(loadRoster()).length;$('#rosterInfo').textContent=n?`${n} studenti associati ai QR.`:'Nessuno studente importato.'
}
function openModal(id){$(id).classList.add('show')}
function closeModals(){$$('.modal').forEach(m=>m.classList.remove('show'))}
$$('.turn').forEach(b=>b.onclick=()=>chooseTurn(b.dataset.turn));
$('#startBtn').onclick=()=>stream?stopCamera():startCamera();
$('#photoBtn').onclick=()=>$('#photoInput').click();
$('#photoInput').onchange=e=>{if(e.target.files[0])decodePhoto(e.target.files[0]);e.target.value=''};

$('#manualOpenBtn').onclick=()=>openModal('#manualModal');
$$('[data-open-list]').forEach(b=>b.onclick=()=>{activeTab=b.dataset.openList;$$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===activeTab));render();openModal('#listModal')});
$$('[data-close]').forEach(b=>b.onclick=closeModals);
$$('.modal').forEach(m=>m.onclick=e=>{if(e.target===m)closeModals()});
$$('.tab').forEach(b=>b.onclick=()=>{activeTab=b.dataset.tab;$$('.tab').forEach(t=>t.classList.toggle('active',t===b));render()});
$('#presenceList').onclick=e=>{const b=e.target.closest('[data-delete]');if(b)deleteRecord(b.dataset.delete)};
$('#manualBtn').onclick=()=>{registerPresence($('#manualCode').value,$('#manualName').value);$('#manualCode').value='';$('#manualName').value='';closeModals()};
$('#exportBtn').onclick=exportCSV;

$('#csvInput').onchange=async e=>{const f=e.target.files[0];if(f){localStorage.setItem(ROSTER,JSON.stringify(parseCSV(await f.text())));render();feedback('ok','Elenco importato','Associazione studenti–QR aggiornata.')}e.target.value=''};
window.addEventListener('beforeunload',stopCamera);
chooseTurn(autoTurn());render();
