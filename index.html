<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#f4fbfd">
  <title>Presenze QR Live</title>

  <style>
    :root{
      --bg:#f4fbfd;
      --card:#ffffff;
      --ink:#17456b;
      --muted:#6f8296;
      --teal:#24aaa5;
      --tealSoft:#e5f8f6;
      --blue:#58a8df;
      --pink:#ef8faf;
      --pinkSoft:#fff0f5;
      --line:#d9e9ef;
      --ok:#148765;
      --warn:#c47b16;
      --danger:#ba4860;
      --shadow:0 10px 26px rgba(40,80,110,.12);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      background:var(--bg);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--ink);
      -webkit-text-size-adjust:100%;
    }

    body{
      padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
    }

    button,input{
      font:inherit;
    }

    button{
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    .app{
      width:100%;
      max-width:500px;
      min-height:100dvh;
      margin:0 auto;
      padding:10px 0 16px;
      display:flex;
      flex-direction:column;
    }

    .hero{
      background:linear-gradient(145deg,#ffffff,#eefbfc);
      border:1px solid var(--line);
      border-radius:28px;
      padding:14px 14px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }


    .brand{
      position:relative;
      z-index:2;
      display:grid;
      grid-template-columns:70px 1fr;
      gap:12px;
      align-items:center;
    }

    .logoWrap{
      width:70px;
      height:70px;
      border-radius:22px;
      background:white;
      border:1px solid #d9e9ef;
      display:grid;
      place-items:center;
      box-shadow:0 8px 18px rgba(40,80,110,.12);
      overflow:hidden;
    }

    .logo{
      width:62px;
      height:62px;
      object-fit:contain;
      display:block;
    }

    .titleBlock{
      min-width:0;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-40px;
      top:-40px;
      width:130px;
      height:130px;
      border-radius:50%;
      background:rgba(36,170,165,.12);
    }

    .chip{
      display:inline-flex;
      gap:6px;
      align-items:center;
      background:var(--tealSoft);
      color:var(--teal);
      border-radius:999px;
      padding:7px 11px;
      font-size:12px;
      font-weight:900;
    }

    h1{
      margin:8px 0 4px;
      font-size:34px;
      line-height:1;
      letter-spacing:-.04em;
      color:var(--ink);
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:14px;
      font-weight:750;
    }

    .turns{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:16px;
    }

    .turn{
      min-height:64px;
      border:0;
      border-radius:22px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--ink);
      font-weight:1000;
      font-size:18px;
      box-shadow:0 6px 16px rgba(40,80,110,.08);
    }

    .turn small{
      display:block;
      margin-top:3px;
      color:var(--muted);
      font-size:11px;
      font-weight:750;
    }

    .turn.active{
      background:linear-gradient(135deg,#25b7b1,#159894);
      color:white;
      border-color:transparent;
    }

    .turn.active small{
      color:#eaffff;
    }

    .card{
      margin-top:10px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      padding:12px;
      box-shadow:var(--shadow);
    }

    .camera{
      position:relative;
      overflow:hidden;
      border-radius:24px;
      background:linear-gradient(145deg,#d4eef2,#a8d5df);
      height:min(42vh,330px);
      min-height:250px;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#d4eef2;
    }

    .camera::before{
      content:"";
      position:absolute;
      z-index:2;
      inset:18% 14%;
      border:4px solid #4bd1ca;
      border-radius:28px;
      box-shadow:0 0 0 999px rgba(19,61,77,.18),0 0 18px rgba(92,241,232,.8);
      pointer-events:none;
    }

    .scanline{
      position:absolute;
      z-index:3;
      left:20%;
      right:20%;
      top:34%;
      height:4px;
      border-radius:5px;
      background:#d1fffb;
      box-shadow:0 0 18px #8af5ec;
      animation:scan 2.2s ease-in-out infinite;
      pointer-events:none;
    }

    @keyframes scan{
      50%{top:66%}
    }

    .cammsg{
      position:absolute;
      z-index:4;
      left:12px;
      right:12px;
      bottom:12px;
      padding:10px;
      border-radius:16px;
      background:rgba(255,255,255,.93);
      text-align:center;
      font-size:13px;
      font-weight:900;
      color:var(--ink);
    }

    .actions{
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .btn{
      min-height:54px;
      border:0;
      border-radius:20px;
      padding:12px;
      font-weight:1000;
      font-size:16px;
    }

    .primary{
      color:white;
      background:linear-gradient(135deg,#2bb8b2,#159b96);
    }

    .secondary{
      color:#246593;
      background:#eef7fb;
      border:1px solid #d2e5ee;
    }

    .blue{
      color:white;
      background:linear-gradient(135deg,#68b6e8,#4a96cf);
    }

    .feedback{
      display:none;
      margin-top:12px;
      padding:12px;
      border-radius:18px;
      font-size:14px;
      font-weight:850;
    }

    .feedback.show{display:block}
    .feedback strong{display:block;margin-bottom:3px;font-size:16px}
    .feedback.ok{color:var(--ok);background:#e9f9f3;border:1px solid #bfe5d8}
    .feedback.err{color:var(--danger);background:#fff0f4;border:1px solid #efc8d2}
    .feedback.dup{color:var(--warn);background:#fff6e8;border:1px solid #ecd3a6}

    .summary{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }

    .summaryCard{
      border:1px solid var(--line);
      border-radius:24px;
      background:white;
      padding:14px;
      box-shadow:var(--shadow);
    }

    .summaryCard small{
      display:block;
      color:var(--muted);
      font-size:11px;
      font-weight:900;
    }

    .summaryCard strong{
      display:block;
      margin-top:3px;
      font-size:30px;
      color:var(--teal);
      line-height:1;
    }

    .summaryCard.pink strong{
      color:var(--pink);
    }

    .bottom{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }

    .send{
      grid-column:1 / -1;
      position:relative;
    }

    .pending{
      position:absolute;
      top:-8px;
      right:-7px;
      min-width:24px;
      height:24px;
      padding:0 7px;
      border-radius:999px;
      display:grid;
      place-items:center;
      color:white;
      background:#f49a32;
      font-size:11px;
      font-weight:1000;
      border:2px solid white;
    }

    .modal{
      position:fixed;
      inset:0;
      z-index:20;
      display:none;
      align-items:flex-end;
      background:rgba(10,39,65,.55);
    }

    .modal.show{
      display:flex;
    }

    .sheet{
      width:100%;
      max-width:500px;
      margin:0 auto;
      max-height:86dvh;
      overflow:auto;
      background:white;
      border-radius:28px 28px 0 0;
      padding:18px 14px calc(20px + env(safe-area-inset-bottom));
    }

    .sheetHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:12px;
      gap:8px;
    }

    .sheetHead h2{
      margin:0;
      font-size:22px;
    }

    .close{
      width:42px;
      height:42px;
      border-radius:15px;
      background:white;
      border:1px solid var(--line);
      color:var(--ink);
      font-weight:1000;
    }

    .list{
      display:grid;
      gap:8px;
    }

    .row{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:8px;
      align-items:center;
      padding:12px;
      background:#fcfeff;
      border:1px solid var(--line);
      border-radius:18px;
    }

    .row strong{
      display:block;
      font-size:14px;
    }

    .row small{
      color:var(--muted);
      font-size:11px;
    }

    .state{
      padding:6px 8px;
      border-radius:999px;
      font-size:10px;
      font-weight:1000;
    }

    .state.yes{
      color:var(--ok);
      background:#e8f8f1;
    }

    .state.no{
      color:var(--warn);
      background:#fff4e3;
    }

    .delete{
      width:38px;
      height:38px;
      border-radius:14px;
      color:var(--danger);
      background:#fff3f5;
      border:1px solid #efc7d0;
    }

    label{
      display:block;
      margin-bottom:5px;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
    }

    input{
      width:100%;
      padding:14px 13px;
      border:1px solid var(--line);
      border-radius:17px;
      color:var(--ink);
      margin-bottom:11px;
      font-size:16px;
    }

    .empty{
      padding:26px 8px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }

    @media(max-height:760px){
      h1{font-size:29px}
      .hero{padding:14px}
      .turn{min-height:58px;font-size:16px}
      .camera{min-height:230px;height:38vh}
      .btn{min-height:48px;font-size:15px}
      .summaryCard{padding:11px}
      .summaryCard strong{font-size:26px}
    }
  
    @media(max-width:390px){
      body{
        padding-left:7px;
        padding-right:7px;
      }

      .brand{
        grid-template-columns:58px 1fr;
        gap:9px;
      }

      .logoWrap{
        width:58px;
        height:58px;
        border-radius:18px;
      }

      .logo{
        width:52px;
        height:52px;
      }

      h1{
        font-size:28px;
      }

      .subtitle{
        font-size:12px;
      }

      .chip{
        font-size:10px;
        padding:6px 9px;
      }

      .turn{
        min-height:56px;
        font-size:16px;
        border-radius:19px;
      }

      .turn small{
        font-size:10px;
      }

      .camera{
        min-height:230px;
        height:38vh;
      }

      .btn{
        min-height:48px;
        font-size:14px;
        border-radius:18px;
      }

      .summaryCard{
        border-radius:21px;
        padding:11px;
      }

      .summaryCard strong{
        font-size:26px;
      }
    }

  </style>
</head>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyEhCjU9mQW2TYn5zSzOrFX4XyEOl63WhMnSl1PlvUXrWNM_q3_HVNYEImLVvcZXgV8iQ/exec";
    const STORAGE = 'presenze_qr_live_logo_v2';
    const $ = s => document.querySelector(s);
    const $$ = s => Array.from(document.querySelectorAll(s));

    const video = $('#video');
    const canvas = $('#canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    let selectedTurn = '07:00';
    let stream = null;
    let scanning = false;
    let detector = null;
    let lastValue = '';
    let lastTime = 0;

    function loadRecords(){
      try { return JSON.parse(localStorage.getItem(STORAGE) || '[]'); }
      catch { return []; }
    }

    function saveRecords(records){
      localStorage.setItem(STORAGE, JSON.stringify(records));
      render();
    }

    function uuid(){
      return crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(16).slice(2);
    }

    function dateKey(date = new Date()){
      return new Intl.DateTimeFormat('sv-SE', { timeZone:'Europe/Rome' }).format(date);
    }

    function localParts(date = new Date()){
      return {
        date: new Intl.DateTimeFormat('it-IT', { timeZone:'Europe/Rome' }).format(date),
        time: new Intl.DateTimeFormat('it-IT', { timeZone:'Europe/Rome', hour:'2-digit', minute:'2-digit', second:'2-digit' }).format(date)
      };
    }

    function esc(text=''){
      return String(text).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function autoTurn(){
      const now = new Date();
      const minutes = now.getHours() * 60 + now.getMinutes();
      return minutes < 11 * 60 ? '07:00' : '13:45';
    }

    function chooseTurn(turn){
      selectedTurn = turn;
      $$('.turn').forEach(btn => btn.classList.toggle('active', btn.dataset.turn === turn));
      $('#camMsg').textContent = stream ? `Inquadra il QR · turno ${turn}` : 'Premi “Apri scanner”';
    }

    function feedback(type, title, detail){
      const el = $('#feedback');
      el.className = 'feedback show ' + type;
      el.innerHTML = `<strong>${esc(title)}</strong>${esc(detail)}`;
      clearTimeout(feedback.timer);
      feedback.timer = setTimeout(() => el.classList.remove('show'), 5500);
    }

    function beep(ok=true){
      try{
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.connect(gain);
        gain.connect(audio.destination);
        osc.frequency.value = ok ? 880 : 220;
        gain.gain.value = .06;
        osc.start();
        osc.stop(audio.currentTime + .12);
      }catch{}
      if(navigator.vibrate) navigator.vibrate(ok ? [80] : [120,70,120]);
    }

    function parseStudent(raw){
      const text = String(raw || '').trim();

      try{
        const obj = JSON.parse(text);
        const cognome = String(obj.cognome || obj.surname || '').trim();
        const nome = String(obj.nome || obj.name || '').trim();
        const full = String(obj.cognome_nome || obj.nome_completo || '').trim();

        return {
          codice: text,
          cognome_nome: (full || [cognome, nome].filter(Boolean).join(' ') || text).toUpperCase()
        };
      }catch{}

      const parts = text.split(/[;|,]/).map(x => x.trim()).filter(Boolean);

      if(parts.length >= 2){
        return {
          codice: text,
          cognome_nome: parts.join(' ').toUpperCase()
        };
      }

      return {
        codice: text,
        cognome_nome: text.toUpperCase()
      };
    }

    function registerPresence(raw){
      const parsed = parseStudent(raw);

      if(!parsed.cognome_nome){
        return feedback('err', 'Dato mancante', 'QR non leggibile.');
      }

      const now = new Date();
      const day = dateKey(now);
      const records = loadRecords();

      const duplicate = records.find(r =>
        r.giorno === day &&
        r.turno === selectedTurn &&
        r.cognome_nome === parsed.cognome_nome
      );

      if(duplicate){
        beep(false);
        return feedback('dup', 'Già registrato', `${duplicate.cognome_nome} · turno ${selectedTurn}`);
      }

      const parts = localParts(now);

      const record = {
        id_registrazione: uuid(),
        timestamp_iso: now.toISOString(),
        giorno: day,
        data: parts.date,
        ora: parts.time,
        turno: selectedTurn,
        codice: parsed.codice,
        cognome_nome: parsed.cognome_nome,
        synced: false
      };

      records.unshift(record);
      saveRecords(records);

      beep(true);
      feedback('ok', 'QR letto correttamente', `${record.cognome_nome} · turno ${selectedTurn}`);
    }

    function googleRequest(params){
      return new Promise((resolve, reject) => {
        const callbackName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        const url = new URL(APPS_SCRIPT_URL);

        Object.entries(params).forEach(([key,value]) => {
          url.searchParams.set(key, value == null ? '' : String(value));
        });

        url.searchParams.set('callback', callbackName);
        url.searchParams.set('_', Date.now());

        const script = document.createElement('script');
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('Nessuna risposta dal foglio. Controllare deployment Apps Script e accesso “Chiunque”.'));
        }, 18000);

        function cleanup(){
          clearTimeout(timer);
          try{ delete window[callbackName]; }catch{ window[callbackName] = undefined; }
          if(script.parentNode) script.parentNode.removeChild(script);
        }

        window[callbackName] = result => {
          cleanup();

          if(result && result.ok){
            resolve(result);
          }else{
            reject(new Error(result && result.error ? result.error : 'Operazione non confermata dal foglio.'));
          }
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Errore di collegamento con Apps Script.'));
        };

        script.src = url.toString();
        document.head.appendChild(script);
      });
    }

    async function testSheet(){
      try{
        await googleRequest({ action:'ping' });
        feedback('ok', 'Collegamento attivo', 'La pagina comunica correttamente con il foglio.');
      }catch(error){
        feedback('err', 'Test non riuscito', error.message);
      }
    }

    async function syncRecord(record){
      const result = await googleRequest({
        action: 'append',
        id_registrazione: record.id_registrazione,
        timestamp_iso: record.timestamp_iso,
        data: record.data,
        ora: record.ora,
        turno: record.turno,
        cognome_nome: record.cognome_nome,
        note: `Turno ${record.turno}`
      });

      const records = loadRecords();
      const idx = records.findIndex(r => r.id_registrazione === record.id_registrazione);

      if(idx >= 0){
        records[idx].synced = true;
        localStorage.setItem(STORAGE, JSON.stringify(records));
        render();
      }

      return result;
    }

    async function sendAll(){
      const pending = loadRecords().filter(r => !r.synced);

      if(!pending.length){
        return feedback('ok', 'Tutto inviato', 'Non ci sono nuove presenze da trasferire.');
      }

      const btn = $('#sendBtn');
      const old = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '⏳ Invio in corso…';

      let sent = 0;

      try{
        for(const record of pending){
          await syncRecord(record);
          sent++;
        }

        feedback('ok', 'Invio completato', `${sent} presenz${sent === 1 ? 'a inviata' : 'e inviate'} al foglio.`);
        beep(true);

      }catch(error){
        feedback('err', 'Invio non riuscito', `${sent} inviate su ${pending.length}. ${error.message}`);
      }finally{
        btn.disabled = false;
        btn.innerHTML = old;
        render();
      }
    }

    async function deleteRecord(id){
      const records = loadRecords();
      const record = records.find(r => r.id_registrazione === id);
      if(!record) return;

      if(!confirm(`Cancellare ${record.cognome_nome}?`)) return;

      try{
        if(record.synced){
          await googleRequest({ action:'delete', id_registrazione: record.id_registrazione });
        }

        saveRecords(records.filter(r => r.id_registrazione !== id));
        feedback('ok', 'Presenza cancellata', record.synced ? 'Eliminata anche dal foglio.' : 'Registrazione locale rimossa.');

      }catch(error){
        feedback('err', 'Cancellazione non riuscita', error.message);
      }
    }

    async function startScanner(){
      try{
        if(stream){
          stopScanner();
          return;
        }

        if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
          throw new Error('Fotocamera non supportata da questo browser.');
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        scanning = true;
        $('#startBtn').textContent = '⏹ Chiudi scanner';
        $('#camMsg').textContent = `Inquadra il QR · turno ${selectedTurn}`;

        if('BarcodeDetector' in window){
          try{
            detector = new BarcodeDetector({ formats:['qr_code'] });
          }catch{ detector = null; }
        }

        requestAnimationFrame(scanLoop);

      }catch(error){
        feedback('err', 'Fotocamera non disponibile', error.message + ' Apri la pagina da Chrome/Safari e autorizza la fotocamera.');
      }
    }

    function stopScanner(){
      scanning = false;

      if(stream){
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;
      $('#startBtn').textContent = '📷 Apri scanner';
      $('#camMsg').textContent = 'Premi “Apri scanner”';
    }

    async function scanLoop(){
      if(!scanning) return;

      try{
        let value = '';

        if(detector){
          const codes = await detector.detect(video);
          if(codes[0]) value = codes[0].rawValue;
        }

        if(!value && video.readyState >= 2){
          const w = video.videoWidth;
          const h = video.videoHeight;

          if(w && h){
            canvas.width = w;
            canvas.height = h;

            ctx.drawImage(video, 0, 0, w, h);

            const image = ctx.getImageData(0, 0, w, h);
            const qr = jsQR(image.data, w, h, { inversionAttempts:'attemptBoth' });

            if(qr) value = qr.data;
          }
        }

        if(value && (value !== lastValue || Date.now() - lastTime > 3500)){
          lastValue = value;
          lastTime = Date.now();
          registerPresence(value);
        }

      }catch{}

      requestAnimationFrame(scanLoop);
    }

    function render(){
      const records = loadRecords();
      const today = dateKey();

      const todayRecords = records.filter(r => r.giorno === today);
      const morning = todayRecords.filter(r => r.turno === '07:00');
      const afternoon = todayRecords.filter(r => r.turno === '13:45');
      const pending = records.filter(r => !r.synced);

      $('#countMorning').textContent = morning.length;
      $('#countAfternoon').textContent = afternoon.length;
      $('#pendingCount').hidden = !pending.length;
      $('#pendingCount').textContent = pending.length;

      $('#presenceList').innerHTML = todayRecords.length
        ? todayRecords.map(r => `
            <div class="row">
              <div>
                <strong>${esc(r.cognome_nome)}</strong>
                <small>${esc(r.turno)} · ${esc(r.ora)}</small>
              </div>
              <span class="state ${r.synced ? 'yes' : 'no'}">${r.synced ? 'Inviata' : 'Da inviare'}</span>
              <button class="delete" data-delete="${esc(r.id_registrazione)}">🗑</button>
            </div>
          `).join('')
        : '<div class="empty">Nessuna presenza registrata oggi.</div>';
    }

    function openModal(id){ $(id).classList.add('show'); }
    function closeModals(){ $$('.modal').forEach(m => m.classList.remove('show')); }

    $$('.turn').forEach(btn => btn.onclick = () => chooseTurn(btn.dataset.turn));

    $('#startBtn').onclick = startScanner;
    $('#testBtn').onclick = testSheet;
    $('#sendBtn').onclick = sendAll;
    $('#listBtn').onclick = () => openModal('#listModal');
    $('#manualBtnOpen').onclick = () => openModal('#manualModal');

    $('#manualSaveBtn').onclick = () => {
      const name = $('#manualName').value.trim();
      if(name) registerPresence(name);
      $('#manualName').value = '';
      closeModals();
    };

    $('#presenceList').onclick = e => {
      const btn = e.target.closest('[data-delete]');
      if(btn) deleteRecord(btn.dataset.delete);
    };

    $$('[data-close]').forEach(btn => btn.onclick = closeModals);
    $$('.modal').forEach(modal => modal.onclick = e => {
      if(e.target === modal) closeModals();
    });

    window.addEventListener('beforeunload', stopScanner);

    chooseTurn(autoTurn());
    render();
  </script>
</body>
</html>
